<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contributors — GeoArchive</title>
  <link rel="stylesheet" href="style.css"/>
  <script type="module" src="auth.js"></script>
  <link rel="icon" type="image/x-icon" href="logos/favicon.png">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YRV1RVTQ89"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YRV1RVTQ89');
  </script>
</head>
<body>

<div class="topnav">
  <a href="/"><img src="logos/logo.png" class="logo" alt="Logo"></a>
  <div class="nav-links">
    <div class="topnav-left">
      <a class="page" href="/map">Map</a>
      <a class="page" href="/database">Database</a>
      <a class="page" href="/contribute">Contribute</a>
      <a class="page" href="/about">About</a>
      <a id="admin-link" class="page" href="/admin" style="display:none">Admin</a>
    </div>
  </div>
</div>

<div class="main-forum-layout">
  <nav class="vertical-tabs" role="tablist" aria-orientation="vertical">
    <div id="user-link-container" class="login-link"></div>
    <a href="/forum" role="tab" class="tab">Forum</a>
    <a href="/recent" role="tab" class="tab">Recent Contributions</a>
    <a href="/users" role="tab" class="tab active">Users</a>
  </nav>

  <main class="forumcontent" role="tabpanel">
    <header class="recent-header">
      <h1>Contributors</h1>
      <p class="recent-subtitle">Everyone who has helped build the archive.</p>
    </header>

    <div id="users-container">
      <p class="forum-loading">Loading contributors...</p>
    </div>
  </main>
</div>

<script type="module">
  import { API_BASE_URL } from './config.js';

  function escapeHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function formatJoined(iso) {
    if (!iso) return 'Unknown';
    return new Date(iso).toLocaleDateString('default', { year: 'numeric', month: 'long' });
  }

  async function loadUsers() {
    const container = document.getElementById('users-container');
    try {
      const res = await fetch(`${API_BASE_URL}/api/user`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const users = await res.json();

      if (users.length === 0) {
        container.innerHTML = '<p class="forum-empty">No contributors yet.</p>';
        return;
      }

      container.innerHTML = users.map((u, i) => `
        <a href="/user/${encodeURIComponent(u.username)}" class="user-card">
          <div class="user-card-left">
            <div class="user-card-rank">#${i + 1}</div>
            <div class="user-card-avatar">${escapeHtml(u.username.charAt(0).toUpperCase())}</div>
            <div class="user-card-info">
              <span class="user-card-name">@${escapeHtml(u.username)}</span>
              <span class="user-card-joined">Joined ${escapeHtml(formatJoined(u.created_at))}</span>
            </div>
          </div>
          <div class="user-card-stats">
            <div class="user-stat">
              <span class="user-stat-value">${u.submission_count}</span>
              <span class="user-stat-label">photo${u.submission_count !== 1 ? 's' : ''}</span>
            </div>
            <div class="user-stat">
              <span class="user-stat-value">${u.edit_count}</span>
              <span class="user-stat-label">edit${u.edit_count !== 1 ? 's' : ''}</span>
            </div>
          </div>
        </a>
      `).join('');
    } catch (err) {
      container.innerHTML = '<p class="forum-error">Failed to load contributors.</p>';
      console.error(err);
    }
  }

  loadUsers();
</script>

</body>
</html>
